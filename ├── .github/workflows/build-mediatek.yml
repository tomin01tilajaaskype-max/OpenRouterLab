name: Build MediaTek Firmware

on:
  workflow_dispatch:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:

  build:

    name: "${{ matrix.device }} (${{ matrix.profile }})"

    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false

      matrix:

        device:
          - z8803be-emmc
          - m60k63

        profile:
          - release
          - developer

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |

          sudo apt update

          sudo apt install -y \
            ack \
            antlr3 \
            asciidoc \
            autoconf \
            automake \
            autopoint \
            binutils \
            bison \
            build-essential \
            ccache \
            clang \
            cmake \
            cpio \
            curl \
            device-tree-compiler \
            ecj \
            fastjar \
            flex \
            gawk \
            gettext \
            gcc-multilib \
            g++-multilib \
            git \
            gperf \
            haveged \
            help2man \
            intltool \
            libelf-dev \
            libglib2.0-dev \
            libgmp3-dev \
            libltdl-dev \
            libmpc-dev \
            libmpfr-dev \
            libncurses-dev \
            libpython3-dev \
            libreadline-dev \
            libssl-dev \
            libtool \
            lz4 \
            p7zip-full \
            python3 \
            python3-pip \
            rsync \
            swig \
            texinfo \
            unzip \
            wget \
            xsltproc \
            zlib1g-dev

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            .ccache
          key: build-${{ runner.os }}-${{ matrix.device }}-${{ matrix.profile }}

      - name: Prepare build
        run: |

          chmod +x scripts/prepare.sh

          ./scripts/prepare.sh \
            ${{ matrix.device }} \
            ${{ matrix.profile }}

      - name: Apply Z8803BE overlay files
        run: |
          if [ -d "devices/${{ matrix.device }}/overlay" ]; then
            rsync -a "devices/${{ matrix.device }}/overlay/" ./immortalwrt/
          else
            echo "No overlay directory for ${{ matrix.device }}, skipping."
          fi

      - name: Configure
        run: |
          cd immortalwrt
          make defconfig

      - name: Download sources
        run: |
          cd immortalwrt
          make download -j$(nproc)

      - name: Compile
        run: |
          cd immortalwrt
          make -j$(nproc)

      - name: Upload firmware
        uses: actions/upload-artifact@v4

        with:

          name: "${{ matrix.device }}-${{ matrix.profile }}"

          path: |
            immortalwrt/bin/targets/**
