name: Build Z8803BE

on:
workflow_dispatch:

push:
branches:
- main

permissions:
contents: read

jobs:
build:
runs-on: ubuntu-24.04

env:
  DEVICE: z8803be
  PROFILE: release
  WORKDIR: immortalwrt

steps:
  - name: Checkout OpenRouterLab
    uses: actions/checkout@v4

  - name: Install dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        build-essential \
        clang \
        flex \
        bison \
        g++ \
        gawk \
        gcc-multilib \
        g++-multilib \
        gettext \
        git \
        libncurses-dev \
        libssl-dev \
        python3 \
        python3-pip \
        rsync \
        unzip \
        zlib1g-dev \
        file \
        wget \
        curl \
        device-tree-compiler \
        ccache \
        patch \
        diffutils

  - name: Prepare build
    run: |
      chmod +x prepare.sh
      ./prepare.sh "$DEVICE" "$PROFILE"

  - name: Configure
    run: |
      cd "$WORKDIR"
      make defconfig

  - name: Download sources
    run: |
      cd "$WORKDIR"
      make download -j"$(nproc)"

  - name: Compile
    run: |
      cd "$WORKDIR"
      make -j"$(nproc)" || make -j1 V=s

  - name: Upload firmware
    if: success()
    uses: actions/upload-artifact@v4
    with:
      name: firmware-z8803be
      path: immortalwrt/bin/targets/**
      if-no-files-found: error
      retention-days: 14
