name: Build ZBT Z8803BE ImmortalWrt

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      DEVICE: z8803be

    steps:
      - name: Checkout OpenRouterLab
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3-distutils \
            python3 \
            python3-pip \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl \
            device-tree-compiler \
            ccache \
            patch \
            diffutils

      - name: Clone ImmortalWrt
        run: |
          git clone --depth=1 \
            https://github.com/immortalwrt/immortalwrt.git \
            openwrt

      - name: Check Z8803BE source files
        run: |
          test -f "devices/${{ env.DEVICE }}/filogic-device-block.mk"
          test -f "devices/${{ env.DEVICE }}/config.seed"

      - name: Apply Z8803BE overlay files
        run: |
          if [ -d "devices/${{ env.DEVICE }}/overlay" ]; then
            echo "Applying Z8803BE overlay files..."
            rsync -a "devices/${{ env.DEVICE }}/overlay/" "openwrt/"
          else
            echo "No overlay directory found, skipping."
          fi
                - name: Add QModem feed
        run: |
          cd openwrt
          echo "src-git qmodem https://github.com/FUjr/QModem.git" >> feeds.conf.default
          cat feeds.conf.default

          

      - name: Add Z8803BE device block
        run: |
          cat "devices/${{ env.DEVICE }}/filogic-device-block.mk" \
            >> "openwrt/target/linux/mediatek/image/filogic.mk"

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Install Z8803BE config
        run: |
          cp "devices/${{ env.DEVICE }}/config.seed" "openwrt/.config"

          cd openwrt
          make defconfig

      - name: Cache build files
        uses: actions/cache@v4
        with:
          path: |
            openwrt/.ccache
            openwrt/staging_dir
            openwrt/build_dir
            openwrt/dl
          key: ${{ runner.os }}-z8803be-${{ hashFiles('devices/z8803be/**') }}
          restore-keys: |
            ${{ runner.os }}-z8803be-

      - name: Download packages
        run: |
          cd openwrt
          make download -j"$(nproc)"

      - name: Build firmware
        run: |
          cd openwrt
          make -j"$(nproc)" || make -j1 V=s

      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: z8803be-immortalwrt-firmware
          path: |
            openwrt/bin/targets/mediatek/filogic/*
          if-no-files-found: error
          retention-days: 14
